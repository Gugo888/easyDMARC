<form [formGroup]="step2Form">
   <mat-form-field>
      <mat-label>Industry</mat-label>
      <mat-select formControlName="industry">
         @for (industry of industries; track industry) {
         <mat-option [value]="industry">{{industry}}</mat-option>
         }
      </mat-select>
   </mat-form-field>

   <mat-form-field>
      <mat-label>Role</mat-label>
      <mat-select formControlName="yourRole">
         @for (role of roles; track role) {
         <mat-option [value]="role">{{role}}</mat-option>
         }
      </mat-select>
   </mat-form-field>

   <mat-form-field>
      <mat-label>Experience</mat-label>
      <input type="number" matInput formControlName="experienceInYears">
   </mat-form-field>
   <button mat-raised-button [disabled]="step2Form.invalid" (click)="next()">Next</button>

</form>
